backend:
  name: git-gateway
  branch: main

# Where uploaded images would go, if you add any later.
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# Friendlier wording in the dashboard.
publish_mode: simple

collections:
  - name: "site"
    label: "Website content"
    files:
      - name: "content"
        label: "Site content"
        file: "content/site.json"
        format: "json"
        fields:
          - label: "Contact & footer"
            name: "common"
            widget: "object"
            fields:
              - { label: "Email address", name: "email", widget: "string" }
              - { label: "Phone number", name: "phone", widget: "string" }
              - { label: "Office", name: "office", widget: "string" }
              - { label: "Footer blurb", name: "footerBlurb", widget: "text" }

          - label: "Home page"
            name: "home"
            widget: "object"
            fields:
              - { label: "Hero — eyebrow (small line above headline)", name: "heroEyebrow", widget: "string" }
              - { label: "Hero headline — text before highlighted word", name: "heroTitleBefore", widget: "string" }
              - { label: "Hero headline — highlighted word", name: "heroTitleHighlight", widget: "string" }
              - { label: "Hero headline — text after highlighted word", name: "heroTitleAfter", widget: "string" }
              - { label: "Hero paragraph", name: "heroLede", widget: "text" }

              - { label: "“Why rollouts fail” — section title", name: "failuresTitle", widget: "string" }
              - { label: "“Why rollouts fail” — intro paragraph", name: "failuresIntro", widget: "text" }
              - label: "Failure modes (the three cards)"
                name: "failures"
                widget: "list"
                fields:
                  - { label: "Number (e.g. 01)", name: "num", widget: "string" }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Body", name: "body", widget: "text" }
                  - { label: "Symptom line", name: "symptom", widget: "string" }

              - { label: "Positioning — section title", name: "positionTitle", widget: "string" }
              - label: "Positioning rows"
                name: "positionRows"
                widget: "list"
                fields:
                  - { label: "Label (left column)", name: "label", widget: "string" }
                  - { label: "Body (right column)", name: "body", widget: "text" }

              - { label: "Closing — title", name: "closerTitle", widget: "string" }
              - { label: "Closing — subtitle", name: "closerSub", widget: "string" }

  - name: "writing"
    label: "Writing / Blog"
    files:
      - name: "posts"
        label: "Blog posts"
        file: "content/writing.json"
        format: "json"
        fields:
          - { label: "Page eyebrow", name: "introEyebrow", widget: "string" }
          - { label: "Page headline", name: "title", widget: "string", hint: "Shown at the top of the Writing page" }
          - { label: "Page intro paragraph", name: "intro", widget: "text" }
          - label: "Posts"
            name: "posts"
            widget: "list"
            label_singular: "Post"
            summary: "{{fields.date}} — {{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD", picker_utc: true }
              - { label: "URL slug", name: "slug", widget: "string", hint: "Lowercase, dashes instead of spaces — this becomes the post's link, e.g. why-pilots-fail" }
              - { label: "Summary", name: "summary", widget: "text", hint: "One or two sentences shown in the list" }
              - { label: "Body", name: "body", widget: "markdown" }
