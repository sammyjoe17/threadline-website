<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Threadline — AI consulting, across every industry</title>
<meta name="description" content="Threadline is the people system around your AI program. A standing SteerCo retainer, expert calls with AI builders, leader workshops in Cambridge, and talent placement from MIT, Harvard &amp; Stanford. Built out of MIT.">
<link rel="stylesheet" href="/colors_and_type.css">
<link rel="stylesheet" href="/site.css">
<link rel="icon" href="/assets/logo-monogram.svg" type="image/svg+xml">

<!-- Netlify Identity: lets the /admin CMS handle login + invite links -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", function (user) {
      if (!user) {
        window.netlifyIdentity.on("login", function () {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>

<!-- Open Graph -->
<meta property="og:title" content="Threadline — AI consulting, across every industry">
<meta property="og:description" content="The people system around your AI program. Built out of MIT.">
<meta property="og:type" content="website">

<script>
  window.__TWEAKS = {
    "displayFont": "Newsreader",
    "density": "comfortable"
  };
</script>
</head>
<body>
<div id="root"></div>

<!-- Hidden form so Netlify's deploy bot detects it. The live React form (js/Contact.js) POSTs to "/" with these same field names. -->
<form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="contact" />
  <input type="text" name="bot-field" />
  <input type="text" name="name" />
  <input type="text" name="role" />
  <input type="text" name="company" />
  <input type="text" name="revenue" />
  <input type="text" name="interest" />
  <textarea name="note"></textarea>
</form>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>

<script src="/js/Bits.js"></script>
<script src="/js/Chrome.js"></script>
<script src="/js/Home.js"></script>
<script src="/js/Engagement.js"></script>
<script src="/js/About.js"></script>
<script src="/js/Writing.js"></script>
<script src="/js/Contact.js"></script>
<script src="/js/tweaks-panel.js"></script>
<script src="/js/TweaksApp.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
